name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller>=6.0

      - name: Build with PyInstaller
        run: |
          pyinstaller VDeskManager.spec --noconfirm

      - name: List build output
        run: |
          if (Test-Path "dist\VDeskManager") {
            Get-ChildItem -Recurse "dist\VDeskManager" | Format-Table -AutoSize
          } else {
            Write-Host "dist\VDeskManager not found. Listing dist/:"
            Get-ChildItem -Recurse "dist" | Format-Table -AutoSize
          }

      - name: Create archive
        run: |
          $tag = "${{ github.ref_name }}"
          $archiveName = "VDeskManager-$tag.zip"
          
          # Find the actual build output directory
          $buildDir = Get-ChildItem -Directory "dist" | Select-Object -First 1
          if ($buildDir) {
            Write-Host "Found build dir: $($buildDir.Name)"
            Compress-Archive -Path "dist\$($buildDir.Name)\*" -DestinationPath "dist\$archiveName" -Force
          } else {
            Write-Error "No build output found under dist/"
            exit 1
          }
          echo "ARCHIVE_NAME=$archiveName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Write-Host "Archive ready: dist/${{ env.ARCHIVE_NAME }}"
          Get-ChildItem "dist/${{ env.ARCHIVE_NAME }}" | Format-Table -AutoSize

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ARCHIVE_NAME }}
          generate_release_notes: true
          draft: false
          prerelease: false
